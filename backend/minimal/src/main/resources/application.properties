server.port=${PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/quick_speech}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.initialization-fail-timeout=-1

spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.health.db.enabled=false

jwt.secret=${JWT_SECRET:quick-speech-jwt-secret-key-at-least-32-characters-long-for-production}
jwt.expiration=86400000

chroma.url=${CHROMA_URL:http://localhost:8000}
ai.openai.api-key=${OPENAI_API_KEY:}
ai.openapi.api-url=${AI_API_URL:https://api.openai.com/v1/chat/completions}
ai.default-model=${AI_DEFAULT_MODEL:gpt-4o-mini}
