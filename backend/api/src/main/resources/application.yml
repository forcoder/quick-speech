server:
  port: ${PORT:8080}

spring:
  application:
    name: quick-speech-api

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/quick_speech}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      minimum-idle: 1
      maximum-pool-size: 5
      idle-timeout: 30000
      connection-timeout: 10000
      initialization-fail-timeout: -1

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

# JWT配置
jwt:
  secret: ${JWT_SECRET:quick-speech-jwt-secret-key-at-least-32-characters-long-for-production}
  expiration: 86400000

# AI API配置
ai:
  openai:
    api-key: ${OPENAI_API_KEY:}
    api-url: ${AI_API_URL:https://api.openai.com/v1/chat/completions}
  default-model: ${AI_DEFAULT_MODEL:gpt-4o-mini}

# Embedding配置
embedding:
  api:
    url: ${EMBEDDING_API_URL:https://api.openai.com/v1/embeddings}
    key: ${OPENAI_API_KEY:}
  model: ${EMBEDDING_MODEL:text-embedding-ada-002}

# Chroma向量数据库配置
chroma:
  url: ${CHROMA_URL:http://localhost:8000}

# 日志配置
logging:
  level:
    root: INFO
    com.quickspeech: DEBUG
    org.springframework.security: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
