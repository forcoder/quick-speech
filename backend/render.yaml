services:
  - type: web
    name: quick-speech-api
    runtime: java
    plan: free
    buildCommand: ./mvnw clean package -DskipTests -B
    startCommand: java -jar api/target/api-*.jar
    healthCheckPath: /actuator/health
    envVars:
      - key: PORT
        value: "8080"
      - key: DB_HOST
        value: "dpg-d7pu5hm8bjmc73blqp40-a.oregon-postgres.render.com"
      - key: DB_PORT
        value: "5432"
      - key: DB_NAME
        value: "quick_speech"
      - key: DB_USERNAME
        value: "quick_speech_user"
      - key: DB_PASSWORD
        value: "2dF2oFGycQlKNkKlTBRZzw27WZZSWM9J"
      - key: JWT_SECRET
        value: "quick-speech-production-jwt-secret-key-2026-secure-random-string"
      - key: CHROMA_URL
        value: ""
      - key: OPENAI_API_KEY
        value: ""
      - key: AI_DEFAULT_MODEL
        value: "gpt-4o-mini"

databases:
  - name: quick-speech-db
    plan: free
    databaseName: quick_speech
    user: quick_speech
