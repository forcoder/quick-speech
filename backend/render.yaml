services:
  - type: web
    name: quick-speech-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    repo: https://github.com/forcoder/quick-speech
    branch: main
    healthCheckPath: /actuator/health
    envVars:
      - key: PORT
        value: "8080"
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: quick-speech-db
          property: connectionString
      - key: DB_USERNAME
        fromDatabase:
          name: quick-speech-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: quick-speech-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: CHROMA_URL
        value: ""
      - key: OPENAI_API_KEY
        sync: false
      - key: AI_DEFAULT_MODEL
        value: "gpt-4o-mini"

databases:
  - name: quick-speech-db
    plan: free
    databaseName: quick_speech
    user: quick_speech
